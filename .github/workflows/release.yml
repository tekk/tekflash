name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip
            skip_tests: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin tekflash

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --bin tekflash

      - name: Stage release artifact
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="tekflash-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/tekflash.exe" "${staging}/"
          else
            cp "target/${{ matrix.target }}/release/tekflash" "${staging}/"
          fi
          cp README.md LICENSE "${staging}/" 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a -tzip "${name}.zip" "${name}" >/dev/null
            echo "ASSET=dist/${name}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${name}.tar.gz" "${name}"
            echo "ASSET=dist/${name}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Compute SHA256
        shell: bash
        run: |
          set -euo pipefail
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ASSET}" > "${ASSET}.sha256"
          else
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          fi

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
